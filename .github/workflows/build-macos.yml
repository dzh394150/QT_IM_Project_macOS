name: Qt 自动编译打包 (macOS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 安装 Qt 6.6.2 + Websockets
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.2'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          setup-python: true
          modules: 'qtwebsockets'

      # 🔥 强制把 Qt 路径加入系统环境（解决变量为空问题）
      - name: 设置 Qt 环境变量
        run: |
          echo "PATH=$QT_ROOT_DIR/bin:$PATH" >> $GITHUB_ENV

      - name: 编译项目
        run: |
          mkdir build
          cd build
          qmake ../qt_im_project_macOS.pro
          make

      - name: 复制资源文件
        run: |
          mkdir -p build/qt_im_project.app/Contents/Resources/
          cp -r btnimage build/qt_im_project.app/Contents/Resources/

      # ✅ 直接用 macdeployqt（现在路径绝对正确）
      - name: 打包 Qt 依赖
        run: |
          cd build
          macdeployqt qt_im_project.app -dmg -always-overwrite

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: Qt_IM_Project_macOS
          path: build/*.dmg