name: Qt 自动编译打包 (macOS 通用版 Intel+M系列)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 安装 Qt 6.6.2 + Websockets
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.2'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          setup-python: true
          modules: 'qtwebsockets'

      - name: 设置 Qt 环境变量
        run: |
          echo "PATH=$QT_ROOT_DIR/bin:$PATH" >> $GITHUB_ENV

      # 🔥 🔥 🔥 这一行是关键：编译通用架构（Intel + M系列）
      - name: 编译项目（通用版）
        run: |
          mkdir build
          cd build
          qmake ../qt_im_project_macOS.pro QMAKE_APPLE_DEVICE_ARCHS="arm64 x86_64"
          make

      - name: 复制资源文件
        run: |
          mkdir -p build/qt_im_project_macOS.app/Contents/Resources/
          cp -r btnimage build/qt_im_project_macOS.app/Contents/Resources/

      - name: 打包 Qt 依赖
        run: |
          cd build
          macdeployqt qt_im_project_macOS.app -dmg -always-overwrite

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: Qt_IM_Project_macOS_Universal
          path: build/*.dmg