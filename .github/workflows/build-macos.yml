name: Qt 自动编译打包 (macOS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      # 🔥 终极修复：完全不用系统Python，让action自己装虚拟环境
      - name: 安装Qt环境（全自动，不碰系统Python）
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.2'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          setup-python: true   # 👈 打开这个，让它自己装虚拟Python
          modules: 'qtwebsockets'

      - name: 编译项目
        run: |
          mkdir build
          cd build
          qmake ../qt_im_project_macOS.pro
          make

      - name: 复制资源文件
        run: |
          mkdir -p build/qt_im_project.app/Contents/Resources/
          cp -r btnimage build/qt_im_project.app/Contents/Resources/

      # 🔥 真正打包Qt依赖（包会变大，无Qt可运行）
      - name: 打包成dmg
        run: |
          cd build
          macdeployqt qt_im_project.app -dmg -always-overwrite

      - name: 上传软件包
        uses: actions/upload-artifact@v4
        with:
          name: Qt_IM_Project_macOS
          path: build/*.dmg