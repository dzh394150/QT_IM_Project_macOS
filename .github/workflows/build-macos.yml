name: Qt 自动编译打包 (macOS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest  # ✅ 官方支持，绝不报错

    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 配置Python虚拟环境（修复安装报错）
        run: |
          python3 -m venv .venv
          echo ".venv/bin" >> $GITHUB_PATH

      - name: 安装Qt 6.6.2 + Websockets
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.2'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          setup-python: false
          modules: 'qtwebsockets'

      - name: 设置Qt环境变量
        run: |
          echo "PATH=$Qt6_DIR/bin:$PATH" >> $GITHUB_ENV

      - name: 编译项目（通用二进制：Intel + Apple Silicon）
        run: |
          mkdir -p build
          cd build
          qmake ../qt_im_project_macOS.pro QMAKE_APPLE_DEVICE_ARCHS="x86_64 arm64"
          make -j$(sysctl -n hw.ncpu)

      - name: 复制图片资源
        run: |
          mkdir -p build/qt_im_project.app/Contents/Resources/btnimage
          cp -r btnimage/* build/qt_im_project.app/Contents/Resources/btnimage/

      - name: 完整打包Qt依赖（无Qt也能运行）
        run: |
          cd build
          macdeployqt qt_im_project.app -dmg -always-overwrite -libpath=$Qt6_DIR/lib

      - name: 上传最终安装包
        uses: actions/upload-artifact@v4
        with:
          name: Qt_IM_Project_macOS_Universal
          path: build/qt_im_project.dmg