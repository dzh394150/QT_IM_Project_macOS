name: Qt 打包 macOS ARM64 (M1/M2/M3专用)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 安装 Qt 6.6.2 + Websockets
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.2'
          host: mac
          target: desktop
          arch: 'clang_64'
          setup-python: true
          modules: 'qtwebsockets'

      - name: 设置环境变量
        run: |
          echo "PATH=$QT_ROOT_DIR/bin:$PATH" >> $GITHUB_ENV

      - name: 编译 ARM64 版本
        run: |
          mkdir build
          cd build
          qmake ../qt_im_project_macOS.pro QMAKE_APPLE_DEVICE_ARCHS="arm64"
          make

      - name: 复制资源
        run: |
          mkdir -p build/qt_im_project_macOS.app/Contents/Resources/
          cp -r btnimage build/qt_im_project_macOS.app/Contents/Resources/

      - name: 打包 dmg
        run: |
          cd build
          macdeployqt qt_im_project_macOS.app -dmg -always-overwrite

      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: Qt_IM_Project_ARM64
          path: build/*.dmg